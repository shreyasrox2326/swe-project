spring.application.name=demo
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
management.endpoints.web.exposure.include=*
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${SMTP_USERNAME}}
app.otp.default-ttl-minutes=${OTP_TTL_MINUTES:10}
app.otp.payment-ttl-minutes=${PAYMENT_OTP_TTL_MINUTES:10}
app.otp.registration-ttl-minutes=${REGISTRATION_OTP_TTL_MINUTES:10}
app.otp.password-reset-ttl-minutes=${PASSWORD_RESET_OTP_TTL_MINUTES:10}

