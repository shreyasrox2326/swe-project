spring.application.name=demo
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
management.endpoints.web.exposure.include=*
app.mail.from=${RESEND_FROM_EMAIL}
app.mail.resend-api-key=${RESEND_API_KEY}
app.otp.default-ttl-minutes=${OTP_TTL_MINUTES:10}
app.otp.payment-ttl-minutes=${PAYMENT_OTP_TTL_MINUTES:10}
app.otp.registration-ttl-minutes=${REGISTRATION_OTP_TTL_MINUTES:10}
app.otp.password-reset-ttl-minutes=${PASSWORD_RESET_OTP_TTL_MINUTES:10}

